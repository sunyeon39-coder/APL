<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Han Pit - Index</title>
  <link rel="stylesheet" href="./css/index.css" />
</head>
<body>
  <header class="index-topbar">
    <div class="topbar-left">
      <button id="backBtn" class="back-btn" type="button" aria-label="Go back to hub">
        <span class="back-icon">←</span>
        <span>Back</span>
      </button>
    </div>

    <div class="topbar-center">
      <div id="topbarTournamentName" class="topbar-title">Tournament Events</div>
    </div>

    <div class="topbar-right">
      <button id="eventAdminBtn" class="manage-btn hidden" type="button">카드 관리</button>
      <button id="seatMapBtn" class="manage-btn alt" type="button">전체 배치도</button>
      <button id="seatMapEditBtn" class="manage-btn hidden">맵 편집</button>
    </div>
  </header>

  <main class="index-page">
    <div id="indexRoot" class="index-root"></div>
  </main>

  <!-- Event Admin Modal -->
  <div id="eventAdminModal" class="modal-backdrop">
    <div class="modal-card event-admin-card">
      <h2>이벤트 카드 관리</h2>

      <div class="event-admin-layout">
        <section class="admin-block">
          <div class="admin-block-head">
            <h3>카드 생성 / 수정</h3>
            <button id="newEventCardBtn" class="mini-btn" type="button">새 카드</button>
          </div>

          <div class="form-group">
            <label for="eventCardSelect">카드 선택</label>
            <select id="eventCardSelect"></select>
          </div>

          <div class="form-group">
            <label for="eventCardId">카드 ID</label>
            <input id="eventCardId" type="text" placeholder="예: event_4" />
          </div>

          <div class="form-group">
            <label for="eventCardBoxId">Box ID</label>
            <input id="eventCardBoxId" type="text" placeholder="예: box_4" />
          </div>

          <div class="form-group">
            <label for="eventCardDate">날짜</label>
            <input id="eventCardDate" type="text" placeholder="예: 2026-02-11" />
          </div>

          <div class="form-group">
            <label for="eventCardTitle">카드 제목</label>
            <input id="eventCardTitle" type="text" placeholder="예: Mini Main Day-1F" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="eventCardStart">시작 시간</label>
              <input id="eventCardStart" type="text" placeholder="예: 21:00" />
            </div>

            <div class="form-group">
              <label for="eventCardClose">마감 시간</label>
              <input id="eventCardClose" type="text" placeholder="예: 21:30" />
            </div>
          </div>

          <div class="modal-actions">
            <button id="saveEventCardBtn" class="btn primary" type="button">카드 저장</button>
            <button id="deleteEventCardBtn" class="btn danger" type="button">카드 삭제</button>
          </div>
        </section>

        <section class="admin-block">
          <h3>현재 카드 목록</h3>
          <div id="eventCardList" class="event-card-list"></div>
        </section>
      </div>

      <div class="modal-actions">
        <button id="closeEventAdminBtn" class="btn ghost" type="button">닫기</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/index.js"></script>
</body>
<!-- Seat Map Modal -->

<div id="seatMapModal" class="modal-backdrop">

<div class="modal-card seat-map-modal-card">

<div class="seat-map-modal-head">

<div>
<div class="seat-map-kicker">FLOOR MAP</div>
<h2>전체 테이블 배치도</h2>
</div>

<button id="seatMapCloseBtn" class="icon-close-btn">✕</button>

</div>

<div id="seatMapCanvas" class="seat-map-canvas"></div>

</div>
</div>
<!-- Map Editor Modal -->

<div id="seatMapEditorModal" class="modal-backdrop">

<div class="modal-card seat-map-admin-card">

<div class="seat-map-modal-head">

<h2>Seat Map Editor</h2>

<button id="seatMapEditorCloseBtn" class="icon-close-btn">✕</button>

</div>

<div class="seat-map-editor-toolbar">

<button id="addSeatBtn" class="mini-btn">Seat 추가</button>

<button id="saveMapBtn" class="mini-btn">맵 저장</button>

</div>

<div id="seatMapEditorCanvas" class="seat-map-canvas"></div>

</div>
</div>
</html>
