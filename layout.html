<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BoxBoard</title>
  <link rel="stylesheet" href="./css/layout.css" />
</head>
<body>

<header class="topbar">
  <div class="top-left">
    <div class="logo">Box<br>Board</div>
    <button id="menuBtn" class="icon-btn" aria-label="menu">≡</button>
  </div>

  <div class="top-right">
    <button id="backBtn" class="pill-btn">Back</button>
  </div>
</header>

<main id="app"></main>

<aside id="pcPanel" class="pc-panel" aria-label="panel">
  <div class="tabs">
    <button class="tab active" data-tab="wait">대기</button>
    <button class="tab" data-tab="seat">배치</button>
  </div>

  <div class="panel-body">
    <div id="panelContent"></div>
  </div>
</aside>

<div id="mobileSheet" class="mobile-sheet" aria-label="mobile sheet">
  <button id="mobileAddSeat" class="sheet-btn">+ Seat 추가</button>
  <button id="mobileAddWaiting" class="sheet-btn ghost">+ 대기 추가</button>
</div>

<script src="./js/layout.js"></script>
</body>
</html>
