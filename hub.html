<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Han Pit – Hub</title>
  <link rel="stylesheet" href="./css/hub.css" />
</head>
<body>
  <header class="hub-top">
    <h1 class="brand">Han Pit</h1>

    <div class="hub-actions">
      <button id="profileBtn" class="top-btn profile" type="button">Profile</button>
      <button id="adminBtn" class="top-btn admin hidden" type="button">Access Manage</button>
      <button id="logoutBtn" class="top-btn logout" type="button">Logout</button>
    </div>
  </header>

  <main class="hub-main">
    <section id="eventList" class="event-list"></section>
  </main>

  <!-- Profile Modal -->
  <div id="profileModal" class="modal-backdrop">
    <div class="modal-card">
      <h2>내 프로필</h2>

      <div class="form-group">
        <label for="profileEmail">이메일</label>
        <input id="profileEmail" type="text" disabled />
      </div>

      <div class="form-group">
        <label for="profileNickname">닉네임</label>
        <input id="profileNickname" type="text" maxlength="7" placeholder="닉네임 입력" />
      </div>

      <div class="form-group">
        <label for="profileAccessCode">내 접근 코드</label>
        <input id="profileAccessCode" type="text" disabled />
      </div>

      <div class="modal-actions">
        <button id="closeProfileBtn" class="btn ghost" type="button">닫기</button>
        <button id="saveProfileBtn" class="btn primary" type="button">저장</button>
      </div>
    </div>
  </div>

  <!-- Admin Modal -->
  <div id="adminModal" class="modal-backdrop">
    <div class="modal-card admin-modal-card">
      <h2>접근 허용 관리</h2>

      <div class="admin-layout">
        <!-- 대회 관리 -->
        <section class="admin-block">
          <div class="admin-block-head">
            <h3>대회 관리</h3>
            <button id="newTournamentBtn" class="mini-btn" type="button">새 대회</button>
          </div>

          <div class="form-group">
            <label for="adminEventSelect">대회 선택</label>
            <select id="adminEventSelect"></select>
          </div>

          <div class="form-group">
            <label for="adminTournamentId">대회 ID</label>
            <input id="adminTournamentId" type="text" placeholder="예: ept-paris-2026" />
          </div>

          <div class="form-group">
            <label for="adminTournamentName">대회명</label>
            <input id="adminTournamentName" type="text" placeholder="예: EPT Paris 2026" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="adminTournamentStartDate">시작일</label>
              <input id="adminTournamentStartDate" type="text" placeholder="26.02.18" />
            </div>

            <div class="form-group">
              <label for="adminTournamentEndDate">종료일</label>
              <input id="adminTournamentEndDate" type="text" placeholder="26.03.01" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="adminTournamentLogoText">로고 텍스트</label>
              <input id="adminTournamentLogoText" type="text" placeholder="예: EPT" />
            </div>

            <div class="form-group">
              <label for="adminEventCode">공용 코드</label>
              <input id="adminEventCode" type="text" placeholder="예: EPT2026A" />
            </div>
          </div>

          <div class="modal-actions">
            <button id="saveTournamentBtn" class="btn primary" type="button">대회 저장</button>
            <button id="deleteTournamentBtn" class="btn danger" type="button">대회 삭제</button>
          </div>
        </section>

        <!-- 유저 허용 관리 -->
        <section class="admin-block">
          <h3>가입 유저 목록</h3>

          <div class="form-group compact">
            <label for="adminSearchInput">유저 검색</label>
            <input id="adminSearchInput" type="text" placeholder="닉네임 또는 이메일 검색" />
          </div>

          <div id="adminUserList" class="user-list"></div>
        </section>
      </div>

      <div class="modal-actions">
        <button id="closeAdminBtn" class="btn ghost" type="button">닫기</button>
      </div>
    </div>
  </div>

  <script type="module" src="./js/hub.js"></script>
</body>
</html>
